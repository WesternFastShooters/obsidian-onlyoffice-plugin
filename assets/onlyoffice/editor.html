<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnlyOffice Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f4f4f4; }
    #editor-root { width: 100%; height: 100%; }
    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      background: #f4f4f4; z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #666; font-size: 14px;
    }
    .loading-overlay.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading" class="loading-overlay">正在初始化编辑器...</div>
  <div id="editor-root"></div>

  <script src="./x2t-converter.js"></script>
  <script src="./editor.js"></script>
</body>
</html>
